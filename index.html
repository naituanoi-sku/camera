const toThaiDate = (d) => `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`;
const toKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

const todayKey = () => toKey(new Date());

const parseThaiDateToKey = (s) => {
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  // input เป็น วัน/เดือน/ปี → key เป็น ปี-เดือน-วัน
  return `${m[3]}-${pad(m[2])}-${pad(m[1])}`;
};

// ---------- storage: ใช้ localStorage เป็นหลัก (เชื่อถือได้ในแอป) เผื่อ window.storage ไม่ทำงาน ----------
const PREFIX = "cameraTradeTool:";
const store = {
  get(key) {
    try {
      const v = localStorage.getItem(PREFIX + key);
      return v == null ? null : v;
    } catch (e) {
      return null;
    }
  },
  set(key, value) {
    try {
      localStorage.setItem(PREFIX + key, value);
      return true;
    } catch (e) {
      return false;
    }
  },
  remove(key) {
    try {
      localStorage.removeItem(PREFIX + key);
    } catch (e) {}
  },
  keys(prefix) {
    try {
      const out = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(PREFIX + prefix)) out.push(k.slice(PREFIX.length));
      }
      return out;
    } catch (e) {
      return [];
    }
  },
};

// ---------- Supabase: ฐานข้อมูลกลาง (ทุกเครื่องเห็นข้อมูลรวมกัน) ----------
const SUPABASE_URL = "https://ueqfrddrkcihtabxtmuj.supabase.co";
const SUPABASE_KEY = "sb_publishable_r4BTqiPEuiQmZP1Qp8T9KA_EFbuOsUh";
const SUPA_TABLE = "camera_purchases";

const supa = {
  headers() {
    return {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
    };
  },
  // ดึงรายการทั้งหมด -> { [dateKey]: [entry, ...] }
  async fetchAll() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPA_TABLE}?select=id,date_key,entry&order=created_at.asc`,
      { headers: this.headers() }
    );
    if (!res.ok) throw new Error("fetch failed " + res.status);
    const rows = await res.json();
    const byDate = {};
    for (const r of rows) {
      if (!byDate[r.date_key]) byDate[r.date_key] = [];
      byDate[r.date_key].push(r.entry);
    }
    return byDate;
  },
  // บันทึก/อัปเดต 1 รายการ (upsert ด้วย id)
  async upsert(id, dateKey, entry) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPA_TABLE}?on_conflict=id`, {
      method: "POST",
      headers: { ...this.headers(), Prefer: "resolution=merge-duplicates" },
      body: JSON.stringify([{ id, date_key: dateKey, entry }]),
    });
    if (!res.ok) throw new Error("upsert failed " + res.status);
  },
  // ลบ 1 รายการ
  async remove(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPA_TABLE}?id=eq.${encodeURIComponent(id)}`, {
      method: "DELETE",
      headers: this.headers(),
    });
    if (!res.ok) throw new Error("delete failed " + res.status);
  },
  // ===== ประวัติชื่อสินค้า (ใช้ร่วมทุกเครื่อง) =====
  async fetchNames() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/camera_product_names?select=name,type&order=updated_at.desc&limit=2000`,
      { headers: this.headers() }
    );
    if (!res.ok) throw new Error("fetch names failed " + res.status);
    return await res.json();
  },
  async saveName(name, type) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/camera_product_names?on_conflict=name`, {
      method: "POST",
      headers: { ...this.headers(), Prefer: "resolution=merge-duplicates" },
      body: JSON.stringify([{ name, type: type || "", updated_at: new Date().toISOString() }]),
    });
    if (!res.ok) throw new Error("save name failed " + res.status);
  },
};

// เปอร์เซ็นต์ค่าฝาก: ถ้ากรอกเองใช้ตามที่กรอก ไม่งั้นราคา<10,000=20%, >=10,000=10%
const consignPct = (item) => {
  if (item.customPct !== "" && item.customPct != null && !isNaN(parseNum(item.customPct))) {
    return parseNum(item.customPct);
  }
  return parseNum(item.price) >= 10000 ? 10 : 20;
};
const consignNet = (item) => {
  const p = parseNum(item.price);
  return Math.round(p - (p * consignPct(item)) / 100);
};

const parseNum = (s) => parseFloat(String(s || "").replace(/,/g, "")) || 0;
const fmtNum = (n) => n.toLocaleString();

// ตัดคำว่า "SN ..." ที่ผู้ใช้อาจพิมพ์ซ้ำในช่อง เหลือแค่ค่าจริง
const cleanSn = (s) => String(s || "").replace(/^\s*SN\s*(เลนส์|เม้าส์|กล้อง)?\s*:?\s*/i, "").trim();

// เดาว่าเป็น "เลนส์" หรือ "ตัวกล้อง" จากชื่อสินค้า
// เลนส์มักมีระยะ+รูรับแสง เช่น "18-45 F4.5-6.3", "50 F1.8", "16-50mm"
// ตัวกล้องเป็นชื่อรุ่นเฉยๆ เช่น "EOS M10", "A6500", "X-T3"
function detectProductType(name) {
  if (!name) return "";
  const n = name.toUpperCase();
  const hasFStop = /\bF\/?\d+(\.\d+)?(-\d+(\.\d+)?)?\b/.test(n); // F1.8, F4.5-6.3
  const hasFocalRange = /\b\d{1,3}-\d{1,3}\s*MM?\b/.test(n); // 18-45mm, 18-45 MM
  const hasMM = /\bMM\b/.test(n);
  const hasLensWords = /\b(STM|IS|OSS|USM|VR|OS|DC|DG|ART|MACRO|PRIME)\b/.test(n);
  if (hasFStop || hasFocalRange || hasMM || hasLensWords) return "lens";

  const hasBodyWords = /\b(EOS|ILCE|ALPHA|X-T\d+|X-S\d+|X-E\d+|X-PRO\d*|Z\d+|D\d{2,4}|GFX\d*|OM-\d+|LUMIX|M\d{1,2}\b|A6\d{3}|A7\w*|R\d{1,3})\b/.test(
    n
  );
  if (hasBodyWords) return "body";

  return ""; // ไม่แน่ใจ ให้คนเลือกเอง
}

function CopyBtn({ text, label = "คัดลอกข้อความ" }) {
  const [copied, setCopied] = useState(false);
  return (
    <button
      onClick={async () => {
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
          setTimeout(() => setCopied(false), 1600);
        } catch (e) {}
      }}
      className="flex items-center gap-2 rounded-lg bg-[#B5652F] hover:bg-[#9E5526] text-[#FFFFFF] font-semibold px-4 py-2.5 text-sm transition-colors active:scale-[0.98]"
    >
      {copied ? <Check size={16} /> : <Copy size={16} />}
      {copied ? "คัดลอกแล้ว" : label}
    </button>
  );
}

function CopySaveButton({ text, onSave, savedToday }) {

// อาการแต่ละอย่าง ครอบด้วย ❌ หน้า-หลัง
function buildConditionLines(product) {
  const lines = [];
  const issueList = ISSUES_BY_TYPE[product.type] || [];
  issueList.forEach((issue) => {
    const state = product.issues[issue.key];
    if (!state?.checked) return;
    let body = issue.label;
    if (issue.needsF) {
      const fVal = (state.f || "").trim();
      if (issue.fOptional) {
        // ใส่ F ก็ต่อท้าย ไม่ใส่ก็ข้าม
        if (fVal) body += `${issue.fPrefix || ""} F${fVal}`;
      } else {
        body += `${issue.fPrefix || ""} F${fVal || "?"}`;
      }
    }
    if (issue.photoSuffix) body += issue.photoSuffix;
    lines.push(`❌${body}❌`);
  });
  if (product.otherCondition) lines.push(`❌${product.otherCondition}❌`);
  return lines;
}

// คำนวณ label การขาย (ขายคู่/แยก) จากการจับชุด (setGroup)
// คืน map: productId -> { suffix } เช่น " (ขายคู่กับ Canon 600D)" หรือ " (แยกขาย)"
function computeSetLabels(products) {
  const labels = {};
  // จัดกลุ่มตาม setGroup ที่ > 0
  const groups = {};
  products.forEach((p) => {
    if (p.setGroup && p.setGroup > 0) {
      if (!groups[p.setGroup]) groups[p.setGroup] = [];
      groups[p.setGroup].push(p);
    }
  });
  // หาตัวหลักของแต่ละชุด: คนที่กดเลือกเอง > กล้อง(body) > ตัวแรกในชุด
  const mainOf = {};
  Object.entries(groups).forEach(([g, list]) => {
    let main = list.find((p) => p.isMainManual);
    if (!main) main = list.find((p) => p.type === "body");
    if (!main) main = list[0];
    mainOf[g] = main;
  });
  products.forEach((p) => {
    if (!p.setGroup || p.setGroup <= 0) {
      // ขายเดี่ยว/แยก — ใส่ "(แยกขาย)" เฉพาะเมื่อมีหลายสินค้าในบิล
      labels[p.id] = products.length > 1 ? " (แยกขาย)" : "";
      return;
    }
    const main = mainOf[p.setGroup];
    if (main && main.id === p.id) {
      labels[p.id] = ""; // ตัวหลัก ไม่ต้องมี suffix
    } else {
      const mn = main?.name || "ตัวหลัก";
      labels[p.id] = ` (ขายคู่กับ ${mn})`;
    }
  });
  return labels;
}

// ข้อความแจ้งอาการต่อ 1 สินค้า สำหรับส่งทีมเช็คตำหนิ
function productIssueMessage(product, setSuffix) {
  const lines = [];
  let header = (product.name || "(ไม่ระบุชื่อ)") + (setSuffix || "");
  lines.push(header);
  if (product.snMount) {
    lines.push(`SN เลนส์ : ${cleanSn(product.sn)}`);
    lines.push(`SN เม้าส์ : ${cleanSn(product.snMount)}`);
  } else if (product.sn) {
    lines.push(`SN : ${cleanSn(product.sn)}`);
  }
  // อาการที่ติ๊ก
  buildConditionLines(product).forEach((l) => lines.push(l));
  // คลีนเซนเซอร์ (สั่งทีมให้คลีน)
  if (product.type === "body" && product.sensorCleaned) {
    lines.push(`‼️คลีนเซนเซอร์`);
  }
  // สถานะ: ส่งซ่อม / ขายได้เลย
  lines.push(product.sendRepair ? `⚠️ ส่งซ่อม` : `✅ ขายได้เลย`);
  return lines.join("\n");
}

function IssueChecklist({ issues, product, onToggle, onFChange }) {
  return (
    <div className="space-y-1.5">
      {issues.map((issue) => {
        const state = product.issues[issue.key] || { checked: false, f: "" };
        return (
          <div key={issue.key} className="flex items-center gap-2">
            <button
              onClick={() => onToggle(issue.key)}
              className={`flex-shrink-0 w-5 h-5 rounded-md border flex items-center justify-center transition-colors ${
                state.checked ? "bg-[#B5652F] border-[#B5652F]" : "border-[#B8B5AC] bg-[#F4F3EF]"
              }`}
            >
              {state.checked && <Check size={13} className="text-[#FFFFFF]" strokeWidth={3} />}
            </button>
            <span className="text-[13px] text-[#3A362F] flex-1">{issue.label}</span>
            {issue.needsF && state.checked && (
              <input
                className="w-16 rounded-md bg-[#F4F3EF] border border-[#D4D2CB] px-2 py-1 text-[13px] text-[#2B2823] focus:outline-none focus:ring-1 focus:ring-[#B5652F]"
                placeholder="F#"
                value={state.f}
                onChange={(e) => onFChange(issue.key, e.target.value)}
              />
            )}
          </div>
        );
      })}
    </div>
  );
}

function AutocompleteInput({ value, onChange, placeholder, history, className }) {
  const [open, setOpen] = useState(false);
  const blurTimer = useRef(null);
  const query = (value || "").trim().toLowerCase();
  const suggestions =
    query.length > 0
      ? (history || []).filter((h) => h.toLowerCase().includes(query) && h.toLowerCase() !== query).slice(0, 6)
      : (history || []).slice(0, 6);

  return (
    <div className="relative">
      <input
        className={className || inputCls}
        placeholder={placeholder}
        value={value}
        onFocus={() => setOpen(true)}
        onBlur={() => {
          blurTimer.current = setTimeout(() => setOpen(false), 150);
        }}
        onChange={(e) => onChange(e.target.value)}
      />
      {open && suggestions.length > 0 && (
        <div className="absolute z-10 left-0 right-0 mt-1 rounded-lg bg-[#F4F3EF] border border-[#D4D2CB] overflow-hidden shadow-lg">
          {suggestions.map((item) => (
            <button
              key={item}
              onMouseDown={(e) => e.preventDefault()}
              onClick={() => {
                onChange(item);
                setOpen(false);
              }}
              className="w-full px-3 py-2.5 text-left text-[13.5px] text-[#3A362F] hover:bg-[#EAE8E2] border-b border-[#DAD8D1] last:border-b-0"
            >
              {item}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

    // ถ้ายังไม่เคยเลือกประเภทเอง ให้ระบบเดาให้อัตโนมัติจากชื่อ
    if (!product.typeManual) {
      const guess = detectProductType(name);
      if (guess) next.type = guess;
    }
    onChange(next);
  };

  const pickSuggestion = (item) => {
    onChange({ ...product, name: item.name, type: item.type || product.type, typeManual: !!item.type });
    setShowSuggestions(false);
  };

  const query = product.name.trim().toLowerCase();
  const suggestions =
    query.length > 0
      ? (history || []).filter((h) => h.name.toLowerCase().includes(query) && h.name.toLowerCase() !== query).slice(0, 6)
      : [];

  return (
    <div className="rounded-xl border border-[#D4D2CB] bg-[#FFFFFF] p-3 space-y-2.5 relative">
      {showRemove && (

          onClick={onRemove}

            value={product.name}

          <p className="text-[11px] text-[#9A9388] mt-1">

      )}

  );
}

function ConditionCard({ product, onChange, conditionHistory }) {
  const [expanded, setExpanded] = useState(false);

  const toggleIssue = (key) => {
    const cur = product.issues[key] || { checked: false, f: "" };
    onChange({ ...product, issues: { ...product.issues, [key]: { ...cur, checked: !cur.checked } } });
  };
  const setF = (key, f) => {
    const cur = product.issues[key] || { checked: false, f: "" };
    onChange({ ...product, issues: { ...product.issues, [key]: { ...cur, f } } });
  };

  const condCount = buildConditionLines(product).length;
  const label = product.name || product.sn || "(ยังไม่ระบุชื่อสินค้า)";
  const typeLabel = PRODUCT_TYPES.find((t) => t.key === product.type)?.label;
  const issueList = ISSUES_BY_TYPE[product.type] || [];

  if (!product.type) {
    return (
      <div className="rounded-xl border border-[#D4D2CB] bg-[#FFFFFF] px-3.5 py-3">
        <div className="text-[13.5px] font-medium text-[#2B2823]">{label}</div>
        <p className="text-[11.5px] text-[#9A9388] mt-1">
          ยังไม่ได้เลือกประเภทสินค้า (ตัวกล้อง/เลนส์) — เลือกก่อนที่ช่อง "สินค้า" ด้านบนค่ะ
        </p>
      </div>
    );
  }

  return (
    <div className="rounded-xl border border-[#D4D2CB] bg-[#FFFFFF] overflow-hidden">
      <button onClick={() => setExpanded(!expanded)} className="w-full flex items-center justify-between px-3.5 py-3">
        <div className="text-left">
          <div className="text-[13.5px] font-medium text-[#2B2823]">
            {label} <span className="text-[#9A9388] font-normal">· {typeLabel}</span>
          </div>
          <div className="flex items-center gap-2 mt-0.5">
            {condCount > 0 && <span className="text-[11px] text-[#B5652F]">พบ {condCount} อาการ</span>}
            <span
              className={`text-[11px] px-1.5 py-0.5 rounded ${
                product.sendRepair ? "bg-[#E8D9C4] text-[#9A6432]" : "bg-[#D6EBDD] text-[#3E7A5A]"
              }`}
            >
              {product.sendRepair ? "ส่งซ่อม" : "ขายได้เลย"}
            </span>
          </div>
        </div>
        {expanded ? <ChevronUp size={16} className="text-[#6E675C]" /> : <ChevronDown size={16} className="text-[#6E675C]" />}
      </button>

      {expanded && (
        <div className="p-3 space-y-3.5 border-t border-[#DAD8D1]">
          <div>
            <span className="block text-xs font-medium text-[#6E675C] mb-1.5 tracking-wide">
              {typeLabel}มีอาการอะไรบ้าง (ติ๊กได้หลายข้อ)
            </span>
            <IssueChecklist issues={issueList} product={product} onToggle={toggleIssue} onFChange={setF} />
          </div>

          {product.type === "body" && (
            <button
              onClick={() => onChange({ ...product, sensorCleaned: !product.sensorCleaned })}
              className="w-full flex items-center gap-2.5 rounded-lg bg-[#F4F3EF] border border-[#D4D2CB] px-3 py-2.5"
            >
              <span
                className={`flex-shrink-0 w-5 h-5 rounded-md border flex items-center justify-center transition-colors ${
                  product.sensorCleaned ? "bg-[#B5652F] border-[#B5652F]" : "border-[#B8B5AC] bg-[#FFFFFF]"
                }`}
              >
                {product.sensorCleaned && <Check size={13} className="text-[#FFFFFF]" strokeWidth={3} />}
              </span>
              <span className="text-[13px] text-[#3A362F]">แจ้งให้คลีนเซนเซอร์</span>
              <span className="text-[11px] text-[#9A9388] ml-auto">ติ๊ก = บอกทีมให้คลีน</span>
            </button>

          <button

            className="w-full flex items-center gap-2.5 rounded-lg bg-[#F4F3EF] border border-[#D4D2CB] px-3 py-2.5"
          >
            <span
              className={`flex-shrink-0 w-5 h-5 rounded-md border flex items-center justify-center transition-colors ${
                product.sendRepair ? "bg-[#C0483B] border-[#C0483B]" : "border-[#B8B5AC] bg-[#FFFFFF]"
              }`}

              {product.sendRepair && <Check size={13} className="text-[#FFFFFF]" strokeWidth={3} />}

            <span className="text-[13px] text-[#3A362F]">ส่งซ่อม</span>

          </button>

          <Field label="อาการอื่นๆ (พิมพ์เพิ่มเติมได้ ระบบจำอาการที่เคยพิมพ์)">
            <AutocompleteInput
              value={product.otherCondition}
              onChange={(v) => onChange({ ...product, otherCondition: v })}
              placeholder="เช่น มีเสียงดังตอนซูม"
              history={conditionHistory}
            />
          </Field>
        </div>
      )}
    </div>
  );
}

// ---------- ช่องเซ็นชื่อด้วยนิ้ว/ปากกา ----------
function SignaturePad({ value, onChange }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef({ x: 0, y: 0 });

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (value) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = value;
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const pos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: ((t.clientX - rect.left) / rect.width) * canvas.width,
      y: ((t.clientY - rect.top) / rect.height) * canvas.height,
    };
  };

  const start = (e) => {
    e.preventDefault();
    drawing.current = true;
    last.current = pos(e);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const p = pos(e);
    ctx.strokeStyle = "#1A1A1A";
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last.current = p;
  };
  const end = () => {
    if (!drawing.current) return;
    drawing.current = false;
    onChange(canvasRef.current.toDataURL("image/png"));
  };
  const clear = () => {
    const ctx = canvasRef.current.getContext("2d");
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(0, 0, canvasRef.current.width, canvasRef.current.height);
    onChange("");
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-xs font-medium text-[#6E675C] tracking-wide">ลายเซ็นลูกค้า (เซ็นด้วยนิ้ว)</span>
        <button type="button" onClick={clear} className="text-[12px] text-[#B5652F] font-medium">
          ล้าง
        </button>
      </div>
      <canvas
        ref={canvasRef}
        width={600}
        height={200}
        className="w-full rounded-lg border border-[#D4D2CB] bg-white touch-none"
        style={{ height: "140px" }}
        onMouseDown={start}
        onMouseMove={move}
        onMouseUp={end}
        onMouseLeave={end}
        onTouchStart={start}
        onTouchMove={move}
        onTouchEnd={end}
      />
    </div>
  );
}

  };

  // ===== Purchase / transfer form (single page, feeds daily summary) =====
  const [tf, setTf] = useState(emptyTf());
  const [tfProducts, setTfProducts] = useState([emptyProduct()]);
  const [savedToday, setSavedToday] = useState(false);
  const [currentEntryId, setCurrentEntryId] = useState(null);
  const [draftLoaded, setDraftLoaded] = useState(false);
  const draftSaveTimer = useRef(null);

  // ===== In-memory purchases cache: { "2026-07-04": [entry, ...] } =====
  // ข้อมูลกลางเก็บที่ Supabase (ทุกเครื่องเห็นรวมกัน) + สำเนาไว้ในเครื่องกันเน็ตหลุด
  const [purchasesByDate, setPurchasesByDate] = useState({});
  const [syncing, setSyncing] = useState(false);
  const [pdfBusy, setPdfBusy] = useState(false);

  const loadFromLocal = useCallback(() => {
    try {
      const keys = store.keys("purchases:");
      const loaded = {};
      for (const k of keys) {
        const v = store.get(k);
        if (v) {
          try {
            loaded[k.slice("purchases:".length)] = JSON.parse(v);
          } catch (e) {}
        }
      }
      return loaded;
    } catch (e) {
      return {};
    }
  }, []);

  const refreshFromCloud = useCallback(async () => {
    setSyncing(true);
    try {
      const byDate = await supa.fetchAll();
      setPurchasesByDate(byDate);
      try {
        for (const [k, list] of Object.entries(byDate)) {
          store.set(`purchases:${k}`, JSON.stringify(list));
        }
      } catch (e) {}
      return true;
    } catch (e) {
      return false;
    } finally {
      setSyncing(false);
    }
  }, []);

  useEffect(() => {
    setPurchasesByDate(loadFromLocal());
    refreshFromCloud();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ===== Product name history — remembers every product name ever typed, so next time it's a tap not a retype =====
  const [productHistory, setProductHistory] = useState([]); // [{ name, type }]

  useEffect(() => {
    // โหลดจากเครื่องก่อน (เร็ว) แล้วดึงของกลางจาก Supabase มาทับ (ทุกเครื่องเห็นชื่อรวมกัน)
    try {
      const v = store.get("product-history");
      if (v) setProductHistory(JSON.parse(v));
    } catch (e) {}
    (async () => {
      try {
        const rows = await supa.fetchNames();
        if (Array.isArray(rows) && rows.length) {
          setProductHistory(rows.map((r) => ({ name: r.name, type: r.type || "" })));
          try {
            store.set("product-history", JSON.stringify(rows.map((r) => ({ name: r.name, type: r.type || "" }))));
          } catch (e) {}
        }
      } catch (e) {}
    })();
  }, []);

  const rememberProductName = useCallback((name, type) => {
    const trimmed = (name || "").trim();
    if (!trimmed) return;
    setProductHistory((prev) => {
      const withoutDup = prev.filter((p) => p.name.toLowerCase() !== trimmed.toLowerCase());
      const next = [{ name: trimmed, type: type || "" }, ...withoutDup].slice(0, 2000);
      store.set("product-history", JSON.stringify(next));
      return next;
    });
    // เก็บขึ้นฐานข้อมูลกลาง (ทุกเครื่องเห็น)
    supa.saveName(trimmed, type).catch(() => {});
  }, []);

  // ===== Custom condition history (learns new symptoms typed in "อาการอื่นๆ") =====
  const [conditionHistory, setConditionHistory] = useState([]);

  useEffect(() => {
    try {
      const v = store.get("condition-history");
      if (v) setConditionHistory(JSON.parse(v));
    } catch (e) {}
  }, []);

  // ===== Refund reason history (เหตุผลโอนคืน — เริ่มจาก default + เพิ่มเองได้) =====
  const [refundReasons, setRefundReasons] = useState(DEFAULT_REFUND_REASONS);

  useEffect(() => {
    try {
      const v = store.get("refund-reasons");
      if (v) {
        const saved = JSON.parse(v);
        // รวม default + ที่เคยเพิ่ม ไม่ซ้ำ
        const merged = [...DEFAULT_REFUND_REASONS];
        saved.forEach((r) => {
          if (!merged.some((m) => m.toLowerCase() === r.toLowerCase())) merged.push(r);
        });
        setRefundReasons(merged);
      }
    } catch (e) {}
  }, []);

  const rememberRefundReason = useCallback((reason) => {
    const trimmed = (reason || "").trim();
    if (!trimmed) return;
    setRefundReasons((prev) => {
      if (prev.some((r) => r.toLowerCase() === trimmed.toLowerCase())) return prev;
      const next = [...prev, trimmed];
      // เก็บเฉพาะที่ไม่ใช่ default (default มีอยู่แล้วในโค้ด)
      const customOnly = next.filter((r) => !DEFAULT_REFUND_REASONS.includes(r));
      store.set("refund-reasons", JSON.stringify(customOnly));
      return next;
    });
  }, []);

  const rememberString = useCallback((value, setter, storageKey) => {
    const trimmed = (value || "").trim();
    if (!trimmed) return;
    setter((prev) => {
      const withoutDup = prev.filter((s) => s.toLowerCase() !== trimmed.toLowerCase());
      const next = [trimmed, ...withoutDup].slice(0, 2000);
      store.set(storageKey, JSON.stringify(next));
      return next;
    });
  }, []);

  // ---- load draft (unsaved in-progress form) on mount, so nothing is lost on close/reopen ----
  useEffect(() => {
    try {
      const v = store.get("draft:purchase-form");
      if (v) {
        const draft = JSON.parse(v);
        if (draft.tf) setTf(draft.tf);
        if (draft.tfProducts && draft.tfProducts.length) setTfProducts(draft.tfProducts);
        if (draft.savedToday) setSavedToday(draft.savedToday);
        if (draft.currentEntryId) setCurrentEntryId(draft.currentEntryId);
      }
    } catch (e) {}
    setDraftLoaded(true);
  }, []);

  // ---- autosave draft on every change, debounced, so closing the app / switching apps never loses data ----
  useEffect(() => {
    if (!draftLoaded) return; // don't overwrite draft with initial empty state before load finishes
    if (draftSaveTimer.current) clearTimeout(draftSaveTimer.current);
    draftSaveTimer.current = setTimeout(() => {
      store.set("draft:purchase-form", JSON.stringify({ tf, tfProducts, savedToday, currentEntryId }));
    }, 400);
    return () => {
      if (draftSaveTimer.current) clearTimeout(draftSaveTimer.current);
    };
  }, [tf, tfProducts, savedToday, currentEntryId, draftLoaded]);

  // ยอดจ่ายจริง = ยอดจริง - มัดจำ (ถ้าใช้โหมดหักมัดจำ) ไม่งั้นใช้ยอดที่กรอกตรงๆ
  const finalAmount = () => {
    if (tf.hasDeposit) {
      return parseNum(tf.realAmount) - parseNum(tf.depositAmount);
    }
    return parseNum(tf.amount);
  };

  // บรรทัดหมายเหตุหักมัดจำ มี ❌ ปิดหน้า-ปิดหลัง + บรรทัดโอนคืนถ้าส่งอุปกรณ์มา
  const depositNoteLine = () => {
    if (!tf.hasDeposit) return "";
    const real = parseNum(tf.realAmount);
    const dep = parseNum(tf.depositAmount);
    const reason = tf.depositReason || "มัดจำ";
    return (
      `❌ยอดจริง ${fmtNum(real)} หักมัดจำ[${reason}] : ${fmtNum(dep)} = ${fmtNum(real - dep)}❌\n` +
      `‼️ถ้าลูกค้าส่งอุปกรณ์มา ร้านโอนคืน ${fmtNum(dep)}‼️`
    );
  };

  // ข้อความแจ้งอาการทั้งหมด ส่งทีมเช็คตำหนิ
  const issueText = () => {
    const prods = tfProducts.filter((p) => p.name || p.sn);
    if (prods.length === 0) return "";
    const labels = computeSetLabels(prods);
    return prods.map((p) => productIssueMessage(p, labels[p.id])).join("\n\n");
  };

  const transferText = () => {
    const lines = [];
    lines.push(tf.date);
    lines.push("");
    // บัญชี/ธนาคาร/ชื่อ — ข้ามได้ถ้าจ่ายเงินสด
    if (!tf.isCash) {
      if (tf.account) lines.push(`เลขบัญชี : ${tf.account}`);
      if (tf.bank) lines.push(`ธนาคาร : ${tf.bank}`);
      if (tf.payeeName) lines.push(`ชื่อ: ${tf.payeeName}`);
    }
    lines.push(`ยอด : ${fmtNum(finalAmount())}`);
    // หมายเหตุหักมัดจำ (ถ้ามี)
    if (tf.hasDeposit) {
      lines.push("");
      lines.push(depositNoteLine());
    }
    lines.push("");
    tfProducts.forEach((p) => {
      if (!p.name && !p.sn && !p.snMount) return;
      lines.push(`ชื่อสินค้า : ${p.name}`);
      if (p.snMount) {
        lines.push(`SN เลนส์ : ${cleanSn(p.sn)}`);
        lines.push(`SN เม้าส์ : ${cleanSn(p.snMount)}`);
      } else {
        lines.push(`SN : ${cleanSn(p.sn)}`);
      }
      lines.push("");
    });
    lines.push(`ซื้อมาจาก : ${tf.buyerSource}`);
    // ของสมนาคุณ (ถ้ามี)
    if (tf.giftItem) {
      const giftLabel = GIFT_ITEMS.find((g) => g.key === tf.giftItem)?.label || tf.giftItem;
      lines.push("");
      lines.push(`ของสมนาคุณ : ${giftLabel}${tf.giftColor ? ` ${tf.giftColor}` : ""}`);
    }
    // ชื่อผู้ปิดการขาย — เคาะลงมา 1 บรรทัด
    if (tf.salesName) {
      lines.push("");
      lines.push(tf.salesName);
    }
    return lines.join("\n").trim();
  };

  // ===== ข้อความโหมดเทรด =====
  const tradeText = () => {
    const lines = [];
    lines.push(`วันที่ ${tf.date}`);
    lines.push("");
    lines.push("👉🏻สินค้าของร้าน");
    lines.push("");
    if (tf.shopItemName) lines.push(tf.shopItemName);
    if (tf.shopItemSn) lines.push(`SN : ${cleanSn(tf.shopItemSn)}`);
    if (tf.shopItemLink) lines.push(tf.shopItemLink);
    lines.push("");
    lines.push("👉🏻สินค้าที่เอามาเทรด");
    lines.push("");
    tfProducts.forEach((p) => {
      if (!p.name && !p.sn) return;
      lines.push(`ชื่อสินค้า : ${p.name}`);
      if (p.snMount) {
        lines.push(`SN เลนส์ : ${cleanSn(p.sn)}`);
        lines.push(`SN เม้าส์ : ${cleanSn(p.snMount)}`);
      } else {
        lines.push(`SN : ${cleanSn(p.sn)}`);
      }
      lines.push("");
    });
    lines.push(`ซื้อมาจาก : ${tf.buyerSource}`);
    lines.push("");
    lines.push("👉🏻ยอดส่วนต่าง");
    if (tf.tradeDir === "noDiff") {
      lines.push("");
      lines.push("ไม่มียอดส่วนต่าง (ยอดเทรดเท่าราคาสินค้า)");
    } else if (tf.tradeDir === "shopPays") {
      // เราจ่ายลูกค้า
      if (tf.hasDeposit) {
        const real = parseNum(tf.realAmount);
        const dep = parseNum(tf.depositAmount);
        const reason = tf.depositReason || "มัดจำ";
        lines.push(`เราจ่ายให้ลูกค้า ${fmtNum(real - dep)} บาท`);
        lines.push(`❌ยอดจริง ${fmtNum(real)} หักมัดจำ[${reason}] : ${fmtNum(dep)} = ${fmtNum(real - dep)}❌`);
        lines.push(`‼️ถ้าลูกค้าส่งอุปกรณ์มา ร้านโอนคืน ${fmtNum(dep)}‼️`);
      } else {
        lines.push(`เราจ่ายให้ลูกค้า ${tf.tradeDiffAmount} บาท`);
      }
      // เราจ่าย ต้องมีบัญชีลูกค้า
      if (tf.account || tf.bank || tf.payeeName) {
        lines.push("");
        if (tf.account) lines.push(`เลขบัญชี : ${tf.account}`);
        if (tf.bank) lines.push(`ธนาคาร : ${tf.bank}`);
        if (tf.payeeName) lines.push(`ชื่อ : ${tf.payeeName}`);
      }
    } else {
      // ลูกค้าจ่ายเรา
      lines.push("");
      if (tf.hasDeposit) {
        const base = parseNum(tf.realAmount); // ยอดก่อนบวก
        const add = parseNum(tf.depositAmount); // ค่าอุปกรณ์ที่ขาด
        const reason = tf.depositReason || "อุปกรณ์";
        const total = base + add;
        lines.push(`ลูกค้าจ่ายให้เรา ${fmtNum(total)} บาท`);
        lines.push(`❌ยอดจริง ${fmtNum(base)} + ค่าอุปกรณ์ที่ขาด[${reason}] ${fmtNum(add)} = ${fmtNum(total)}❌`);
        lines.push(`‼️ถ้าลูกค้าส่งอุปกรณ์มา ร้านโอนคืน ${fmtNum(add)}‼️`);
      } else {
        lines.push(`ลูกค้าจ่ายให้เรา ${tf.tradeDiffAmount} บาท`);
      }
    }
    // หักมัดจำ (แสดงในบล็อกยอดส่วนต่างแล้ว)
    if (tf.salesName) {
      lines.push("");
      lines.push(tf.salesName);
    }
    return lines.join("\n").trim();
  };

  // ===== ข้อความโหมดโอนคืนลูกค้า =====
  const refundText = () => {
    const lines = [];
    lines.push("โอนเงินคืนลูกค้า");
    if (tf.refundReason) lines.push(`เนื่องจาก : ${tf.refundReason}`);
    lines.push("");
    if (tf.account) lines.push(`เลขบัญชี : ${tf.account}`);
    if (tf.bank) lines.push(`ธนาคาร : ${tf.bank}`);
    if (tf.payeeName) lines.push(`ชื่อ : ${tf.payeeName}`);
    lines.push(`ยอด : ${tf.amount}`);
    if (tf.buyerSource) lines.push(`จาก : ${tf.buyerSource}`);
    if (tf.salesName) {
      lines.push("");
      lines.push(tf.salesName);
    }
    return lines.join("\n").trim();
  };

  // เลือกข้อความตามโหมด
  const mainText = () => {
    if (tf.mode === "trade") return tradeText();
    if (tf.mode === "refund") return refundText();
    if (tf.mode === "consign") return consignText();
    return transferText();
  };

  // ===== ข้อความโหมดฝากขาย =====
  const consignTotal = () => {
    return (tf.consignItems || []).reduce((sum, it) => sum + (it.name || it.price ? consignNet(it) : 0), 0);
  };

  const consignText = () => {
    const items = (tf.consignItems || []).filter((it) => it.name || it.price);
    const lines = [];
    lines.push(`วันที่ ${tf.date}`);
    lines.push("");
    lines.push("▲ โอนเงินลูกค้าฝากขาย ▲");
    lines.push("");
    if (tf.account) lines.push(`เลขบัญชี : ${tf.account}`);
    if (tf.bank) lines.push(`ธนาคาร : ${tf.bank}`);
    if (tf.payeeName) lines.push(`ชื่อ : ${tf.payeeName}`);
    lines.push(`ยอด : ${fmtNum(consignTotal())}`);
    lines.push("");
    items.forEach((it, idx) => {
      const price = parseNum(it.price);
      const pct = consignPct(it);
      const net = consignNet(it);
      lines.push(`${idx + 1}. ${it.name} ราคา ${fmtNum(price)} บาท`);
      if (it.noLink) lines.push("ไม่มีลิงก์ในชีท");
      else if (it.link) lines.push(it.link);
      lines.push(`▲ รวม ${fmtNum(price)} - ${pct}% = ${fmtNum(net)} บาท ▲`);
      lines.push("");
    });
    const sumParts = items.map((it) => fmtNum(consignNet(it))).join("+");
    lines.push(`‼️รวมทั้งหมด ${sumParts} = ${fmtNum(consignTotal())} บาทครับ‼️`);
    if (tf.buyerSource) {
      lines.push("");
      lines.push(`มาจาก : ${tf.buyerSource}`);
    }
    if (tf.salesName) {
      lines.push("");
      lines.push(tf.salesName);
    }
    return lines.join("\n").trim();
  };

  const saveTransferToLog = () => {
    const prods = tfProducts.filter((p) => p.name || p.sn);
    let hasAmount;
    if (tf.mode === "trade") hasAmount = parseNum(tf.tradeDiffAmount) > 0 || prods.length > 0;
    else if (tf.mode === "refund") hasAmount = parseNum(tf.amount) > 0;
    else if (tf.mode === "consign") hasAmount = consignTotal() > 0;
    else hasAmount = tf.hasDeposit ? parseNum(tf.realAmount) > 0 : parseNum(tf.amount) > 0;
    if (!hasAmount && prods.length === 0) {
      showToast("กรอกยอดหรือสินค้าก่อนนะคะ");
      return;
    }
    const key = parseThaiDateToKey(tf.date) || todayKey();
    const entryId = currentEntryId || crypto.randomUUID();
    // ยอดที่บันทึกเข้าสรุป
    let savedAmount;
    if (tf.mode === "trade") {
      if (tf.tradeDir === "noDiff") savedAmount = "0";
      else if (tf.hasDeposit) {
        const real = parseNum(tf.realAmount);
        const dep = parseNum(tf.depositAmount);
        savedAmount = tf.tradeDir === "shopPays" ? fmtNum(real - dep) : fmtNum(real + dep);
      } else savedAmount = tf.tradeDiffAmount;
    } else if (tf.mode === "refund") savedAmount = tf.amount;
    else if (tf.mode === "consign") savedAmount = fmtNum(consignTotal());
    else savedAmount = fmtNum(finalAmount());
    const entry = {
      id: entryId,
      mode: tf.mode,
      tradeDir: tf.tradeDir,
      // นับเข้ายอดรวมเฉพาะเงินที่ร้านจ่ายออก
      // เทรด: เราจ่ายลูกค้า=นับ, ลูกค้าจ่ายเรา/ไม่มีส่วนต่าง=ไม่นับ
      countsToTotal: !(tf.mode === "trade" && tf.tradeDir !== "shopPays"),
      fullText: mainText(), // ข้อความเต็มตามโหมด สำหรับแสดงในสรุปยอด
      amount: savedAmount,
      isCash: tf.isCash,
      depositNote: tf.hasDeposit ? depositNoteLine() : "",
      refundReason: tf.refundReason,
      shopItemName: tf.shopItemName,
      shopItemSn: tf.shopItemSn,
      shopItemLink: tf.shopItemLink,
      buyerSource: tf.buyerSource,
      payeeName: tf.payeeName,
      giftItem: tf.giftItem,
      giftColor: tf.giftColor,
      salesName: tf.salesName,
      products: (() => {
        const labels = computeSetLabels(prods);
        return prods.map((p) => ({
          id: p.id,
          name: p.name,
          sn: p.sn,
          snMount: p.snMount,
          type: p.type,
          setGroup: p.setGroup,
          setLabel: labels[p.id] || "",
          sendRepair: p.sendRepair,
          conditionLines: buildConditionLines(p),
        }));
      })(),
    };

    // อัปเดต cache ในหน่วยความจำก่อน (ชัวร์ 100% ไม่พึ่ง storage) แล้วค่อย sync ลง storage
    let isUpdate = false;
    setPurchasesByDate((prev) => {
      const dayList = prev[key] ? [...prev[key]] : [];
      const existingIdx = dayList.findIndex((e) => e.id === entryId);
      if (existingIdx >= 0) {
        dayList[existingIdx] = entry;
        isUpdate = true;
      } else {
        dayList.push(entry);
      }
      const next = { ...prev, [key]: dayList };
      store.set(`purchases:${key}`, JSON.stringify(dayList));
      return next;
    });

    setSavedToday(true);
    setCurrentEntryId(entryId);
    prods.forEach((p) => rememberProductName(p.name, p.type));
    prods.forEach((p) => rememberString(p.otherCondition, setConditionHistory, "condition-history"));
    showToast(isUpdate ? "อัปเดตรายการแล้ว" : "บันทึกเข้าสรุปยอดวันนี้แล้ว");

    // ส่งขึ้นฐานข้อมูลกลาง (ทุกเครื่องเห็น) — ถ้าเน็ตหลุดยังมีสำเนาในเครื่อง
    supa.upsert(entryId, key, entry).catch(() => {
      showToast("บันทึกในเครื่องแล้ว แต่ยังไม่ขึ้นฐานข้อมูลกลาง (เช็คเน็ต)");
    });
  };

  // ===== สร้าง PDF จาก HTML (รองรับภาษาไทยเต็มที่ ผ่าน html2canvas) =====
  const renderHtmlToPdf = async (html, filename) => {
    setPdfBusy(true);
    try {
      // สร้าง element ชั่วคราวนอกจอ
      const holder = document.createElement("div");
      holder.style.position = "fixed";
      holder.style.left = "-9999px";
      holder.style.top = "0";
      holder.style.width = "794px"; // A4 ~ 96dpi
      holder.style.background = "#FFFFFF";
      holder.innerHTML = html;
      document.body.appendChild(holder);

      const canvas = await window.html2canvas(holder, { scale: 2, backgroundColor: "#FFFFFF" });
      document.body.removeChild(holder);

      const imgData = canvas.toDataURL("image/jpeg", 0.92);
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: "pt", format: "a4" });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const imgW = pageW;
      const imgH = (canvas.height / canvas.width) * imgW;
      let y = 0;
      // ถ้ายาวเกิน 1 หน้า แบ่งหน้า
      if (imgH <= pageH) {
        pdf.addImage(imgData, "JPEG", 0, 0, imgW, imgH);
      } else {
        let remaining = imgH;
        let position = 0;
        while (remaining > 0) {
          pdf.addImage(imgData, "JPEG", 0, position, imgW, imgH);
          remaining -= pageH;
          if (remaining > 0) {
            pdf.addPage();
            position -= pageH;
          }
        }
      }
      // สร้างไฟล์ PDF
      const blob = pdf.output("blob");
      const file = new File([blob], filename, { type: "application/pdf" });

      // 1) Web Share API — วิธีหลัก เด้งเลือก Good Notes ได้เลย (iPad รองรับในโหมดแอป)
      try {
        if (navigator.share) {
          await navigator.share({ files: [file], title: filename });
          showToast("เลือก Good Notes เพื่อเปิดเอกสารได้เลย");
          return;
        }
      } catch (shareErr) {
        if (shareErr && shareErr.name === "AbortError") return; // ผู้ใช้กดยกเลิกเอง
        // ถ้า share ไฟล์ไม่ได้ ค่อยลองวิธีถัดไป
      }

      // 2) เปิด PDF แบบ data URI ในแท็บใหม่
      const dataUri = pdf.output("datauristring");
      const win = window.open();
      if (win) {
        win.document.write(
          `<html><head><title>${filename}</title><meta name="viewport" content="width=device-width, initial-scale=1"></head>` +
            `<body style="margin:0;padding:0;"><iframe src="${dataUri}" style="border:0;width:100vw;height:100vh;"></iframe></body></html>`
        );
        win.document.close();
        showToast("เปิดเอกสารแล้ว — กดปุ่มแชร์ (📤) เลือก Good Notes");
        return;
      }

      // 3) Fallback: ดาวน์โหลด
      pdf.save(filename);
      showToast("สร้าง PDF แล้ว — อยู่ในแอป ไฟล์ > ดาวน์โหลด");
    } catch (e) {
      showToast("สร้าง PDF ไม่สำเร็จ ลองใหม่อีกครั้ง");
    } finally {

                        </Field>

                        </Field>
                      </div>

              <div>
                <span className="block text-xs font-medium text-[#6E675C] mb-1.5 tracking-wide">
                  ของสมนาคุณ (ถ้ามี — ไม่เลือกก็ได้)

                <div className="flex flex-wrap gap-1.5">
                  {GIFT_ITEMS.map((g) => (
                    <button

                      onClick={() => {
                        setTf((prev) => ({
                          ...prev,
                          giftItem: prev.giftItem === g.key ? "" : g.key,
                          giftColor: "",

                        setSavedToday(false);
                      }}
                      className={`rounded-full px-3 py-1.5 text-[12px] font-medium border transition-colors ${

                            onClick={() => {

                    product={p}
                    conditionHistory={conditionHistory}
                    onChange={(np) => setTfProducts(tfProducts.map((x) => (x.id === p.id ? np : x)))}
                  />
                ))}
              {tfProducts.filter((p) => p.name || p.sn).length === 0 && (
                <p className="text-[13px] text-[#9A9388]">กรอกชื่อสินค้าด้านบนก่อน จะมาให้ติ๊กอาการตรงนี้ค่ะ</p>
              )}
            </div>

            {/* ข้อความแจ้งอาการ — ส่งทีมเช็คตำหนิ */}
            {tfProducts.some((p) => p.name || p.sn) && (
              <div className="rounded-xl bg-[#FFFFFF] border border-[#D4D2CB] p-3.5">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-medium text-[#6E675C]">ข้อความแจ้งอาการ (ส่งทีมเช็คตำหนิ)</span>
                  <CopyBtn text={issueText()} label="คัดลอก" />
                </div>
                <pre className="whitespace-pre-wrap text-[13px] leading-relaxed text-[#5A544A] font-sans">{issueText()}</pre>
              </div>
            )}
            </>
            )}

            <div className="h-px bg-[#DAD8D1] my-2" />

            {/* ข้อความ (เปลี่ยนตามโหมด) */}
            <div className="rounded-xl bg-[#FFFFFF] border border-[#D4D2CB] p-3.5">
              <span className="text-xs font-medium text-[#6E675C]">
                {tf.mode === "trade"
                  ? "ข้อความแจ้งเทรด"
                  : tf.mode === "refund"
                  ? "ข้อความโอนคืนลูกค้า"
                  : tf.mode === "consign"
                  ? "ข้อความโอนเงินฝากขาย"
                  : "ข้อความแจ้งโอนเงิน"}
              </span>
              <pre className="whitespace-pre-wrap text-[13.5px] leading-relaxed text-[#3A362F] font-sans mt-2">{mainText()}</pre>
            </div>

            {/* ปุ่มเดียว: คัดลอกข้อความ + บันทึกเข้าสรุปยอด พร้อมกัน */}
            <CopySaveButton
              text={mainText()}
              onSave={saveTransferToLog}
              savedToday={savedToday}
            />

            {savedToday && (
              <button
                onClick={startNewEntry}
                className="w-full flex items-center justify-center gap-2 rounded-xl font-semibold py-3 text-[14px] text-[#B5652F] border border-[#B5652F]/40 bg-[#F6EEE6]"
              >
                <Plus size={16} /> เริ่มรายการใหม่ (ลูกค้าคนถัดไป)
              </button>
            )}

            {/* ===== เอกสาร: ข้อมูลลูกค้า + ลายเซ็น + สร้าง PDF (รับซื้อ/ฝากขาย) ===== */}
            {(tf.mode === "buy" || tf.mode === "consign") && (
              <div className="rounded-xl bg-[#FFFFFF] border border-[#D4D2CB] p-3.5 space-y-3">
                <div className="flex items-center gap-2">
                  <ClipboardList size={16} className="text-[#B5652F]" />
                  <span className="text-[13.5px] font-semibold text-[#2B2823]">เอกสาร/ใบเสร็จ (ให้ลูกค้าเซ็น)</span>
                </div>
                <p className="text-[11.5px] text-[#9A9388] -mt-1">
                  กรอกข้อมูลลูกค้าจากบัตรประชาชน + ให้ลูกค้าเซ็น แล้วกดสร้าง PDF เปิดใน Good Notes ส่งพี่บัญชีได้เลย
                </p>

                <Field label="ชื่อ-นามสกุล ลูกค้า">
                  <input
                    className={inputCls}
                    placeholder="เช่น นายสมชาย ใจดี"
                    value={tf.custName}
                    onChange={(e) => setTf({ ...tf, custName: e.target.value })}
                  />
                </Field>
                <Field label="เลขบัตรประชาชน">
                  <input
                    className={inputCls}
                    placeholder="เช่น 1 2345 67890 12 3"
                    value={tf.custId}
                    onChange={(e) => setTf({ ...tf, custId: e.target.value })}
                  />
                </Field>
                <Field label="ที่อยู่">
                  <textarea
                    className={inputCls}
                    rows={2}
                    placeholder="ที่อยู่ตามบัตรประชาชน"
                    value={tf.custAddr}
                    onChange={(e) => setTf({ ...tf, custAddr: e.target.value })}
                  />
                </Field>
                <Field label="เบอร์โทร (ถ้ามี)">
                  <input
                    className={inputCls}
                    placeholder="เช่น 08x-xxx-xxxx"
                    value={tf.custPhone}
                    onChange={(e) => setTf({ ...tf, custPhone: e.target.value })}
                  />
                </Field>

                <SignaturePad
                  value={tf.custSignature}
                  onChange={(sig) => setTf({ ...tf, custSignature: sig })}
                />

                <div className="grid grid-cols-1 gap-2 pt-1">
                  {tf.mode === "buy" && (
                    <button
                      type="button"
                      onClick={() => generateReceiptPdf()}
                      disabled={pdfBusy}
                      className="w-full flex items-center justify-center gap-2 rounded-xl font-semibold py-3 text-[14px] bg-[#B5652F] text-[#FFFFFF]"
                    >
                      <ClipboardList size={16} /> {pdfBusy ? "กำลังสร้าง..." : "สร้างใบเสร็จรับเงิน (PDF)"}
                    </button>
                  )}
                  {tf.mode === "consign" && (
                    <button
                      type="button"
                      onClick={() => generateConsignPdf()}
                      disabled={pdfBusy}
                      className="w-full flex items-center justify-center gap-2 rounded-xl font-semibold py-3 text-[14px] bg-[#B5652F] text-[#FFFFFF]"
                    >
                      <ClipboardList size={16} /> {pdfBusy ? "กำลังสร้าง..." : "สร้างเอกสารฝากขาย (PDF)"}
                    </button>
                  )}
                </div>
              </div>
            )}

            <ClearFormButton onClear={startNewEntry} />
          </>
        )}

        {/* ===== SUMMARY TAB ===== */}
        {tab === "summary" && (
          <>
            <div className="rounded-xl border border-[#D4D2CB] bg-[#FFFFFF] p-3.5 space-y-2.5">
              <div>
                <span className="block text-xs font-medium text-[#6E675C] mb-1.5 tracking-wide">แจ้งสรุปรับซื้อวันที่</span>
                <div className="flex gap-2">
                  <input
                    className={inputCls}
                    placeholder="3/7/2026"
                    value={summaryDateInput}
                    onChange={(e) => setSummaryDateInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && loadSummaryForDate(summaryDateInput)}
                  />
                  <button
                    type="button"
                    onClick={() => loadSummaryForDate(summaryDateInput)}
                    className="flex-shrink-0 flex items-center justify-center gap-1.5 rounded-lg bg-[#B5652F] hover:bg-[#9E5526] text-[#FFFFFF] font-semibold px-4 text-sm"
                  >
                    <Search size={15} /> ค้นหา
                  </button>
                </div>
              </div>
              <div className="flex items-center justify-between">
                <p className="text-[11.5px] text-[#9A9388] flex-1 pr-2">
                  ข้อมูลรวมทุกเครื่อง กดรีเฟรชเพื่อดึงรายการล่าสุดที่เครื่องอื่นบันทึกไว้
                </p>
                <button
                  type="button"
                  onClick={refreshFromCloud}
                  disabled={syncing}
                  className="flex-shrink-0 flex items-center gap-1.5 rounded-lg bg-[#F4F3EF] border border-[#D4D2CB] text-[#B5652F] font-medium px-3 py-1.5 text-[12px]"
                >
                  <RotateCcw size={13} className={syncing ? "animate-spin" : ""} />
                  {syncing ? "กำลังโหลด..." : "รีเฟรช"}
                </button>
              </div>

              {/* วันที่มีข้อมูลบันทึกไว้ — แตะเลือกได้เลย ไม่ต้องพิมพ์ */}
              {(() => {
                const datesWithData = Object.keys(purchasesByDate).filter(
                  (k) => (purchasesByDate[k] || []).length > 0
                );
                if (datesWithData.length === 0) return null;
                datesWithData.sort().reverse();
                return (
                  <div>
                    <span className="block text-[11px] text-[#9A9388] mb-1.5">วันที่มีรายการบันทึกไว้ (แตะเพื่อดู)</span>
                    <div className="flex flex-wrap gap-1.5">
                      {datesWithData.map((k) => {
                        const [y, m, d] = k.split("-");
                        const thai = `${d}/${m}/${y}`;
                        const active = loadedKey === k;
                        return (
                          <button
                            key={k}
                            type="button"
                            onClick={() => {
                              setSummaryDateInput(thai);
                              setLoadedKey(k);
                            }}
                            className={`rounded-lg px-3 py-1.5 text-[12px] font-medium border transition-colors ${
                              active
                                ? "bg-[#B5652F] border-[#B5652F] text-[#FFFFFF]"
                                : "bg-[#F4F3EF] border-[#D4D2CB] text-[#5A544A]"
                            }`}
                          >
                            {thai} ({purchasesByDate[k].length})
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
            </div>

            {entries.length > 0 && (
              <div className="space-y-2">
                <span className="text-xs font-medium text-[#6E675C] tracking-wide">
                  รายการวันที่ {displayDate} ({entries.length})
                </span>
                {entries.map((e, idx) => (
                  <div key={e.id} className="rounded-lg bg-[#FFFFFF] border border-[#D4D2CB] p-3 text-[13px] relative">
                    <button
                      onClick={() => removeEntry(e.id)}
                      className="absolute top-2 right-2 text-[#6E675C] hover:text-[#C0483B] p-1"
                    >
                      <Trash2 size={14} />
                    </button>
                    <div className="font-semibold text-[#B5652F] flex items-center gap-2">
                      <span>({idx + 1}) ยอด: {e.amount || "-"}</span>
                      {e.mode === "trade" && <span className="text-[10.5px] px-1.5 py-0.5 rounded bg-[#D6EBDD] text-[#3E7A5A]">เทรด</span>}
                      {e.mode === "refund" && <span className="text-[10.5px] px-1.5 py-0.5 rounded bg-[#E8D9C4] text-[#9A6432]">โอนคืน</span>}
                      {e.mode === "consign" && <span className="text-[10.5px] px-1.5 py-0.5 rounded bg-[#E8D9C4] text-[#9A6432]">ฝากขาย</span>}
                    </div>
                    {e.mode === "trade" && e.shopItemName && (
                      <div className="text-[#6E675C] mt-0.5">ของร้าน: {e.shopItemName}</div>
                    )}
                    {e.mode === "refund" && e.refundReason && (
                      <div className="text-[#6E675C] mt-0.5">เหตุผล: {e.refundReason}</div>
                    )}
                    {e.products.map((p) => (
                      <div key={p.id} className="text-[#5A544A] mt-0.5">
                        {p.name} {p.sn && `· SN ${cleanSn(p.sn)}`}
                        {p.setLabel && <span className="text-[#B5652F]"> {p.setLabel}</span>}
                        {p.sendRepair && <span className="text-[#C0483B]"> · ส่งซ่อม</span>}
                      </div>
                    ))}
                    {e.buyerSource && <div className="text-[#6E675C] mt-0.5">ซื้อจาก: {e.buyerSource}</div>}
                    {e.salesName && <div className="text-[#6E675C]">ผู้รับซื้อ: {e.salesName}</div>}
                  </div>
                ))}
              </div>
            )}

            <div className="rounded-xl bg-[#FFFFFF] border border-[#D4D2CB] p-3.5">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-medium text-[#6E675C]">สรุปยอดพร้อมส่ง</span>
                <CopyBtn text={summaryText()} label="คัดลอกสรุป" />
              </div>
              {entries.length === 0 ? (
                <p className="text-[13px] text-[#9A9388]">
                  ยังไม่มีรายการของวันนี้ — ไปกรอกที่แท็บ "รับซื้อ + แจ้งโอนเงิน" แล้วกดบันทึกเข้าสรุปยอดก่อนนะคะ
                </p>
              ) : (
                <pre className="whitespace-pre-wrap text-[13.5px] leading-relaxed text-[#3A362F] font-sans">{summaryText()}</pre>
              )}
            </div>
          </>
        )}
      </div>

      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-[#2B2823] border border-[#2B2823] text-white text-[13px] px-4 py-2 rounded-full shadow-lg z-20">
          {toast}
        </div>
      )}
    </div>
  );
}


// mount
const rootEl=document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<App />);

</script>
</body>
</html>
