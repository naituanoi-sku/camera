<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ลงลายมือชื่อ | Naituanoi</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",sans-serif;
       background:#F4F3EF;color:#2B2823;padding:16px;}
  .card{max-width:560px;margin:0 auto;background:#fff;border:1px solid #E5E3DD;border-radius:16px;padding:18px;}
  h1{font-size:18px;margin:0 0 4px;}
  .sub{font-size:13px;color:#6E675C;margin:0 0 16px;line-height:1.5;}
  .label{font-size:12px;color:#6E675C;margin-bottom:6px;display:block;}
  #pad{width:100%;height:220px;border:2px dashed #C9C6BD;border-radius:12px;background:#fff;touch-action:none;display:block;}
  .row{display:flex;gap:8px;margin-top:12px;}
  button{flex:1;border:0;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;}
  .ghost{background:#F4F3EF;color:#5A544A;border:1px solid #D4D2CB;}
  .primary{background:#4A8C74;color:#fff;}
  .primary:disabled{opacity:.5;}
  .msg{margin-top:14px;font-size:13px;text-align:center;line-height:1.6;}
  .ok{color:#3E7A5A;font-weight:700;}
  .err{color:#C0483B;}
  .done{text-align:center;padding:24px 8px;}
  .done .big{font-size:44px;}
  .done h2{font-size:17px;margin:10px 0 6px;}
  .done p{font-size:13.5px;color:#6E675C;margin:0;line-height:1.6;}
</style>
</head>
<body>
<div class="card" id="card">
  <h1>ลงลายมือชื่อ</h1>
  <p class="sub">รบกวนลงลายมือชื่อของท่านในกรอบด้านล่าง แล้วกดปุ่ม “ส่งลายเซ็น” ขอบคุณค่ะ</p>

  <span class="label">ลายมือชื่อ</span>
  <canvas id="pad"></canvas>

  <div class="row">
    <button class="ghost" id="clear" type="button">ล้าง</button>
    <button class="primary" id="send" type="button" disabled>ส่งลายเซ็น</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script>
(function(){
  var SUPABASE_URL = "https://ueqfrddrkcihtabxtmuj.supabase.co";
  var SUPABASE_KEY = "sb_publishable_r4BTqiPEuiQmZP1Qp8T9KA_EFbuOsUh";
  var TABLE = "camera_purchases";

  var params = new URLSearchParams(location.search);
  var token = params.get("t") || "";

  var card = document.getElementById("card");
  var msg  = document.getElementById("msg");
  var pad  = document.getElementById("pad");
  var btnClear = document.getElementById("clear");
  var btnSend  = document.getElementById("send");

  if(!token){
    card.innerHTML = '<div class="done"><div class="big">⚠️</div><h2>ลิงก์ไม่ถูกต้อง</h2>'+
                     '<p>รบกวนขอลิงก์ใหม่จากทางร้านอีกครั้งค่ะ</p></div>';
    return;
  }

  // ---- signature pad (transparent canvas) ----
  var ctx, drawing = false, hasInk = false, last = null;

  function sizeCanvas(){
    var r = pad.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    var data = hasInk ? pad.toDataURL() : null;
    pad.width  = Math.round(r.width * dpr);
    pad.height = Math.round(r.height * dpr);
    ctx = pad.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.lineWidth = 2.6;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#111111";
    if(data){
      var img = new Image();
      img.onload = function(){ ctx.drawImage(img, 0, 0, r.width, r.height); };
      img.src = data;
    }
  }
  sizeCanvas();
  window.addEventListener("resize", sizeCanvas);

  function pos(e){
    var r = pad.getBoundingClientRect();
    var t = (e.touches && e.touches[0]) || e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }
  function start(e){
    e.preventDefault();
    drawing = true; last = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(last.x + 0.1, last.y + 0.1); ctx.stroke();
    hasInk = true; btnSend.disabled = false;
  }
  function move(e){
    if(!drawing) return;
    e.preventDefault();
    var p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    last = p;
  }
  function end(){ drawing = false; }

  pad.addEventListener("mousedown", start);
  pad.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  pad.addEventListener("touchstart", start, {passive:false});
  pad.addEventListener("touchmove", move, {passive:false});
  pad.addEventListener("touchend", end);

  btnClear.addEventListener("click", function(){
    ctx.clearRect(0, 0, pad.width, pad.height);
    hasInk = false; btnSend.disabled = true; msg.textContent = "";
  });

  // ---- trim transparent margins so the shop gets a tight signature ----
  function trim(canvas){
    var c = canvas.getContext("2d");
    var w = canvas.width, h = canvas.height;
    var d = c.getImageData(0, 0, w, h).data;
    var minX = w, minY = h, maxX = -1, maxY = -1;
    for(var y = 0; y < h; y++){
      for(var x = 0; x < w; x++){
        if(d[(y * w + x) * 4 + 3] > 20){
          if(x < minX) minX = x;
          if(x > maxX) maxX = x;
          if(y < minY) minY = y;
          if(y > maxY) maxY = y;
        }
      }
    }
    if(maxX < 0) return canvas.toDataURL("image/png");
    var pad2 = Math.round(Math.max(w, h) * 0.02);
    minX = Math.max(0, minX - pad2); minY = Math.max(0, minY - pad2);
    maxX = Math.min(w - 1, maxX + pad2); maxY = Math.min(h - 1, maxY + pad2);
    var cw = maxX - minX + 1, ch = maxY - minY + 1;
    var oc = document.createElement("canvas");
    oc.width = cw; oc.height = ch;
    oc.getContext("2d").drawImage(canvas, minX, minY, cw, ch, 0, 0, cw, ch);
    return oc.toDataURL("image/png");
  }

  // เก็บลายเซ็นไว้ในเครื่องลูกค้ากันหาย
  function saveLocal(dataUrl){
    try { localStorage.setItem("pending-sig:" + token, dataUrl); } catch(e){}
  }
  function clearLocal(){
    try { localStorage.removeItem("pending-sig:" + token); } catch(e){}
  }
  function loadLocal(){
    try { return localStorage.getItem("pending-sig:" + token); } catch(e){ return null; }
  }

  // ส่งขึ้นเซิร์ฟเวอร์ พร้อมลองซ้ำอัตโนมัติ
  function sendToServer(dataUrl, attempt){
    attempt = attempt || 1;
    var MAX = 4;
    msg.className = "msg";
    msg.textContent = attempt === 1 ? "กำลังส่ง..." : ("กำลังลองส่งใหม่ (ครั้งที่ " + attempt + ")...");

    return fetch(SUPABASE_URL + "/rest/v1/" + TABLE + "?on_conflict=id", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify([{
        id: "sig:" + token,
        date_key: "__signature__",
        entry: { signature: dataUrl, signedAt: new Date().toISOString() }
      }])
    })
    .then(function(res){
      if(!res.ok) throw new Error("HTTP " + res.status);
      clearLocal();
      card.innerHTML = '<div class="done"><div class="big">✅</div>' +
                       '<h2>ส่งลายเซ็นเรียบร้อยแล้ว</h2>' +
                       '<p>ขอบคุณมากค่ะ ทางร้านได้รับลายเซ็นของท่านแล้ว<br>ท่านสามารถปิดหน้านี้ได้เลยค่ะ</p></div>';
      return true;
    })
    .catch(function(err){
      if(attempt < MAX){
        var wait = attempt * 1200;
        return new Promise(function(r){ setTimeout(r, wait); })
               .then(function(){ return sendToServer(dataUrl, attempt + 1); });
      }
      // ส่งไม่สำเร็จจริงๆ — ลายเซ็นยังอยู่ในเครื่อง ไม่หาย
      msg.className = "msg err";
      msg.innerHTML = "⚠️ ส่งไม่สำเร็จ (สัญญาณอาจไม่ดี)<br>" +
                      "<b>ลายเซ็นของท่านถูกเก็บไว้แล้ว ไม่หายค่ะ</b><br>" +
                      "กรุณาเช็กอินเทอร์เน็ต แล้วกด “ส่งลายเซ็น” อีกครั้ง";
      btnSend.disabled = false;
      btnSend.textContent = "ส่งลายเซ็นอีกครั้ง";
      return false;
    });
  }

  btnSend.addEventListener("click", function(){
    if(!hasInk) return;
    btnSend.disabled = true;
    var dataUrl = trim(pad);
    saveLocal(dataUrl);          // เซฟกันหายก่อนส่ง
    sendToServer(dataUrl, 1);
  });

  // ถ้าเคยเซ็นค้างไว้แล้วส่งไม่สำเร็จ — กู้กลับมาให้ ไม่ต้องเซ็นใหม่
  (function restorePending(){
    var saved = loadLocal();
    if(!saved) return;
    var img = new Image();
    img.onload = function(){
      var r = pad.getBoundingClientRect();
      var scale = Math.min(r.width / img.width, r.height / img.height, 1);
      var w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (r.width - w) / 2, (r.height - h) / 2, w, h);
      hasInk = true;
      btnSend.disabled = false;
      msg.className = "msg";
      msg.innerHTML = "พบลายเซ็นที่ยังส่งไม่สำเร็จ — <b>ไม่ต้องเซ็นใหม่</b><br>กด “ส่งลายเซ็น” ได้เลยค่ะ";
    };
    img.src = saved;
  })();
})();
</script>
</body>
</html>
